<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINGO Caller</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- LEFT PANEL: Called Numbers Board -->
        <div class="left-panel">
            <div id="called-board">
                <div class="bingo-column">
                    <div class="column-header col-b">B</div>
                    <div class="column-numbers" id="col-B"></div>
                </div>
                <div class="bingo-column">
                    <div class="column-header col-i">I</div>
                    <div class="column-numbers" id="col-I"></div>
                </div>
                <div class="bingo-column">
                    <div class="column-header col-n">N</div>
                    <div class="column-numbers" id="col-N"></div>
                </div>
                <div class="bingo-column">
                    <div class="column-header col-g">G</div>
                    <div class="column-numbers" id="col-G"></div>
                </div>
                <div class="bingo-column">
                    <div class="column-header col-o">O</div>
                    <div class="column-numbers" id="col-O"></div>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="right-panel">
            <!-- Top bar: hamburger + title -->
            <div class="top-bar">
                <div class="hamburger-wrap">
                    <button id="hamburger-btn" class="hamburger-btn" aria-label="Menu">&#9776;</button>
                    <div id="hamburger-menu" class="hamburger-menu hidden">
                        <button id="menu-music" class="menu-item">&#9835; Music Off</button>
                        <button id="menu-new-game" class="menu-item">New Game</button>
                        <a href="../word_games.html" class="menu-item">Return to Menu</a>
                    </div>
                </div>
                <h1 class="title">BINGO!</h1>
            </div>

            <!-- Main Stage: Video + Number Reveal -->
            <div id="stage">
                <div id="video-container" class="hidden">
                    <video id="ball-video" muted playsinline></video>
                </div>
                <div id="number-reveal" class="hidden">
                    <div class="reveal-ball" id="reveal-ball">
                        <div id="reveal-letter"></div>
                        <div id="reveal-number"></div>
                    </div>
                </div>
                <div id="stage-prompt">
                    <p>Enter a bingo number to call!</p>
                </div>
            </div>

            <!-- Recent calls strip -->
            <div id="recent-strip">
                <h3>Last Called:</h3>
                <div id="recent-calls"></div>
            </div>

            <!-- Input Area -->
            <div id="input-area">
                <div class="input-group">
                    <label for="ball-input">Call Number:</label>
                    <input type="text" id="ball-input" placeholder="e.g. B7, I22, N35..." maxlength="4" autocomplete="off">
                    <button id="call-btn" class="btn btn-call">CALL IT!</button>
                </div>
                <div id="input-error" class="hidden"></div>
            </div>

            <!-- BINGO winner button -->
            <button id="bingo-winner-btn" class="btn btn-bingo-winner">BINGO!</button>
        </div>
    </div>

    <!-- BINGO Celebration Overlay -->
    <div id="celebration-overlay" class="hidden">
        <div class="confetti-container" id="confetti-container"></div>
        <div class="celebration-content">
            <h1 class="celebration-title">BINGO!</h1>
            <div class="celebration-buttons">
                <button id="celeb-new-game" class="btn btn-celeb">New Game</button>
                <a href="../word_games.html" class="btn btn-celeb btn-celeb-menu">Return to Menu</a>
            </div>
        </div>
    </div>

    <!-- Background music audio element -->
    <audio id="bg-music" loop>
        <!-- <source src="music/bingo-tunes.mp3" type="audio/mpeg"> -->
    </audio>

    <script src="app.js"></script>
</body>
</html>
